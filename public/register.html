<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Taskium Executive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
    <main class="auth-page">
        <div class="auth-card">
            <div class="sidebar-logo" style="justify-content: center; margin-bottom: 2.5rem;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                </svg>
                <span style="font-size: 2rem;">Taskium</span>
            </div>
            
            <div style="margin-bottom: 2rem;">
                <h1 style="font-size: 1.75rem; font-weight: 800; color: var(--text-primary);">Create Account</h1>
                <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">Join the workspace</p>
            </div>

            <form id="register-form" style="text-align: left;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem; padding: 0.875rem;">
                    Sign Up
                </button>
            </form>

            <div class="auth-footer" style="margin-top: 2.5rem; border-top: 1px solid var(--border); padding-top: 2rem;">
                Already have an account? <a href="/login.html" class="auth-link">Sign In</a>
            </div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>
    <script src="/js/auth.js"></script>
</body>
</html>
