<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initialize | Spatial OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-wrapper">
    <div class="spatial-panel auth-panel">
        <div class="brand" style="justify-content: center; margin-bottom: 3rem;">
            <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--highlight)); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            Taskium
        </div>
        <h2 style="font-size: 2.25rem; font-weight: 800; margin-bottom: 1rem; letter-spacing: -0.05em;">GENERATE_IDENTITY</h2>
        <p style="color: var(--text-dim); margin-bottom: 3rem; font-size: 0.9rem;">Join the enterprise spatial ecosystem.</p>
        
        <form id="register-form">
            <div style="margin-bottom: 1.25rem; text-align: left;">
                <input type="text" id="name" class="spatial-input" required placeholder="Full Name">
            </div>
            <div style="margin-bottom: 1.25rem; text-align: left;">
                <input type="email" id="email" class="spatial-input" required placeholder="Authentication ID">
            </div>
            <div style="margin-bottom: 2.5rem; text-align: left;">
                <input type="password" id="password" class="spatial-input" required placeholder="Security Key">
            </div>
            <button type="submit" class="btn-neon" style="width: 100%; padding: 1.25rem; font-size: 1rem; letter-spacing: 0.1em;">INIT_WORKSPACE</button>
        </form>
        
        <div style="margin-top: 3rem; font-size: 0.85rem; color: var(--text-dim);">
            SYSTEM_EXISTS? <a href="/login.html" style="color: var(--highlight); text-decoration: none; font-weight: 700;">AUTHORIZE_ENTRY</a>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="/js/auth.js"></script>
</body>
</html>
