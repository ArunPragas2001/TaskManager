<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="brand">
            <svg class="brand-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4">
                </path>
            </svg>
            TaskManager Pro
        </div>
        <div class="user-info" id="user-info-nav" style="display: none;">
            <span class="user-name" id="nav-user-name"></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
        <div class="auth-links" id="auth-links-nav">
            <a href="/login.html" class="auth-link" style="margin-right: 1rem;">Login</a>
            <a href="/register.html" class="btn-primary" style="padding: 0.5rem 1rem; font-size: 0.85rem; width: auto;">Register</a>
        </div>
    </nav>

    <script>
        // Check for user info from local storage
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                document.getElementById('nav-user-name').textContent = `Hello, ${user.name}`;
                document.getElementById('user-info-nav').style.display = 'flex';
                document.getElementById('auth-links-nav').style.display = 'none';
            } else {
                // If no user is logged in, redirect to login page
                window.location.href = '/login.html';
            }
        });

        function logout() {
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }
    </script>

    <main class="app-container">
        <!-- Left Column: Form -->
        <aside>
            <div class="card">
                <div class="card-header">
                    <h2 id="form-title">Create New Task</h2>
                </div>
                <form id="task-form" data-edit-id="">
                    <div class="form-group">
                        <label for="title">Task Title</label>
                        <input type="text" id="title" name="title" required placeholder="e.g., Finalize Q3 Report">
                    </div>

                    <div class="form-group">
                        <label for="deadline">Deadline</label>
                        <input type="datetime-local" id="deadline" name="deadline" required>
                    </div>

                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status" required>
                            <option value="Pending">Pending</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary" id="submit-btn">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4">
                            </path>
                        </svg>
                        <span id="submit-btn-text">Add Task</span>
                    </button>
                    <button type="button" class="btn-secondary" id="cancel-edit-btn"
                        style="display: none; margin-top: 0.5rem; width: 100%; padding: 0.75rem 1rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color);">
                        Cancel Edit
                    </button>
                </form>
            </div>
        </aside>

        <!-- Right Column: Task List -->
        <section>
            <div class="card">
                <div class="card-header list-header">
                    <h2>Your Tasks</h2>
                    <div class="filter-group">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="Pending">Pending</button>
                        <button class="filter-btn" data-filter="Completed">Completed</button>
                    </div>
                </div>

                <div id="task-container" class="task-container">
                    <div class="empty-state">Loading tasks...</div>
                </div>
            </div>
        </section>
    </main>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/js/app.js"></script>
</body>

</html>
